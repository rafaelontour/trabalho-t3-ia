services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: livros-postgres
    environment:
      POSTGRES_DB: livros
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - livros_postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d livros"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: livros-api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/livros
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - huggingface_cache:/app/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: livros-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  livros_postgres_data:
  huggingface_cache:
